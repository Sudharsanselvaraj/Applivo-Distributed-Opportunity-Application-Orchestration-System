<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CareerOS — AI Career Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; }
body { background: #0a0a0f; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const API = "http://127.0.0.1:8000";

const getToken = () => localStorage.getItem("careeros_token");
const setToken = (t) => localStorage.setItem("careeros_token", t);
const clearToken = () => localStorage.removeItem("careeros_token");

async function apiFetch(path, opts = {}) {
  const token = getToken();
  const res = await fetch(`${API}${path}`, {
    ...opts,
    headers: {
      "Content-Type": "application/json",
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
      ...(opts.headers || {}),
    },
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || `HTTP ${res.status}`);
  }
  return res.json();
}

const Spinner = () => (
  <div style={{ display:"flex", justifyContent:"center", padding:"40px" }}>
    <div className="spinner" />
  </div>
);

const Badge = ({ children, color = "#00ff9d" }) => (
  <span style={{
    background: color + "22", color, border: `1px solid ${color}44`,
    borderRadius:"4px", padding:"2px 8px", fontSize:"11px", fontWeight:700,
    letterSpacing:"0.05em", textTransform:"uppercase", fontFamily:"var(--font-mono)",
  }}>{children}</span>
);

const StatusBadge = ({ status }) => {
  const map = {
    applied:"#00ff9d", interview_scheduled:"#00d4ff", offer_received:"#ffd700",
    offer_accepted:"#ffd700", rejected:"#ff4757", viewed:"#a29bfe",
    shortlisted:"#fd79a8", pending_approval:"#fdcb6e", queued:"#74b9ff",
    failed:"#ff4757", new:"#636e72", analyzed:"#00ff9d", success:"#00ff9d",
    running:"#00d4ff", pending:"#fdcb6e",
  };
  return <Badge color={map[status] || "#636e72"}>{status?.replace(/_/g," ")}</Badge>;
};

const StatCard = ({ label, value, sub, accent="#00ff9d" }) => (
  <div className="stat-card">
    <div className="stat-value" style={{ color:accent }}>{value ?? "—"}</div>
    <div className="stat-label">{label}</div>
    {sub && <div className="stat-sub">{sub}</div>}
  </div>
);

const SectionHeader = ({ icon, title, action }) => (
  <div className="section-header">
    <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
      <span style={{ fontSize:"18px" }}>{icon}</span>
      <h2 className="section-title">{title}</h2>
    </div>
    {action}
  </div>
);

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [mode, setMode] = useState("login");
  const [form, setForm] = useState({ email:"", password:"", full_name:"" });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const submit = async () => {
    setLoading(true); setError("");
    try {
      if (mode === "register") {
        await apiFetch("/api/auth/register", { method:"POST", body:JSON.stringify(form) });
        setMode("login");
        setError("Registered! Please sign in.");
        return;
      }
      const data = await apiFetch("/api/auth/login", {
        method:"POST", body:JSON.stringify({ email:form.email, password:form.password }),
      });
      setToken(data.access_token);
      onLogin();
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  return (
    <div className="login-bg">
      <div className="login-grid" />
      <div className="login-card">
        <div className="login-logo">
          <span className="logo-icon">⬡</span>
          <span className="logo-text">CAREER<span style={{color:"#00ff9d"}}>OS</span></span>
        </div>
        <p className="login-sub">Personal AI Career Automation Platform</p>
        <div className="tab-row">
          <button className={`tab-btn ${mode==="login"?"active":""}`} onClick={()=>setMode("login")}>Sign In</button>
          <button className={`tab-btn ${mode==="register"?"active":""}`} onClick={()=>setMode("register")}>Register</button>
        </div>
        {mode==="register" && (
          <input className="input" placeholder="Full Name" value={form.full_name}
            onChange={e=>setForm({...form,full_name:e.target.value})} />
        )}
        <input className="input" placeholder="Email" type="email" value={form.email}
          onChange={e=>setForm({...form,email:e.target.value})} />
        <input className="input" placeholder="Password" type="password" value={form.password}
          onChange={e=>setForm({...form,password:e.target.value})}
          onKeyDown={e=>e.key==="Enter"&&submit()} />
        {error && (
          <div style={{color:error.includes("Registered")?"#00ff9d":"#ff4757",fontSize:"13px",marginTop:"4px"}}>
            {error}
          </div>
        )}
        <button className="btn-primary" onClick={submit} disabled={loading}>
          {loading ? "Loading..." : mode==="login" ? "Launch Platform →" : "Create Account →"}
        </button>
      </div>
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({ stats }) {
  if (!stats) return <Spinner />;
  const a = stats.applications || { total_sent:0, interviews:0, offers:0, response_rate:0, interview_rate:0, pending_approval:0, applied:0, viewed:0, shortlisted:0, rejected:0 };
  return (
    <div className="page">
      <div className="page-header">
        <div>
          <h1 className="page-title">Mission Control</h1>
          <p className="page-sub">Your career automation at a glance</p>
        </div>
      </div>
      <div className="stats-grid">
        <StatCard label="Applications Sent" value={a.total_sent} accent="#00ff9d" />
        <StatCard label="Interviews" value={a.interviews} accent="#00d4ff" />
        <StatCard label="Offers" value={a.offers} accent="#ffd700" />
        <StatCard label="Response Rate" value={`${a.response_rate}%`} accent="#a29bfe" />
        <StatCard label="Interview Rate" value={`${a.interview_rate}%`} accent="#fd79a8" />
        <StatCard label="Jobs in DB" value={stats.total_jobs_in_db} sub={`+${stats.new_jobs_today} today`} accent="#00ff9d" />
      </div>
      <div className="funnel-row">
        {[
          {label:"Pending",val:a.pending_approval,c:"#fdcb6e"},
          {label:"Applied",val:a.applied,c:"#00ff9d"},
          {label:"Viewed",val:a.viewed,c:"#a29bfe"},
          {label:"Shortlisted",val:a.shortlisted,c:"#fd79a8"},
          {label:"Interviews",val:a.interviews,c:"#00d4ff"},
          {label:"Offers",val:a.offers,c:"#ffd700"},
          {label:"Rejected",val:a.rejected,c:"#ff4757"},
        ].map(({label,val,c})=>(
          <div key={label} className="funnel-item">
            <div className="funnel-bar-wrap">
              <div className="funnel-bar" style={{height:`${Math.min(100,(val/Math.max(a.total_sent,1))*100)}%`,background:c}} />
            </div>
            <div className="funnel-val" style={{color:c}}>{val}</div>
            <div className="funnel-label">{label}</div>
          </div>
        ))}
      </div>
      <div className="two-col">
        <div className="card">
          <SectionHeader icon="🏆" title="Top Matching Jobs" />
          {stats.top_jobs?.length ? stats.top_jobs.map(j=>(
            <div key={j.id} className="list-row">
              <div>
                <div className="row-title">{j.title}</div>
                <div className="row-sub">{j.company_name} · {j.work_mode}</div>
              </div>
              <Badge color="#00ff9d">{j.analysis?.match_score?.toFixed(0)??"?"}%</Badge>
            </div>
          )) : <div className="empty">No jobs yet. Run the agent to discover jobs.</div>}
        </div>
        <div className="card">
          <SectionHeader icon="📋" title="Recent Applications" />
          {stats.recent_applications?.length ? stats.recent_applications.map(a=>(
            <div key={a.id} className="list-row">
              <div>
                <div className="row-title">{a.job_title_snapshot}</div>
                <div className="row-sub">{a.company_snapshot}</div>
              </div>
              <StatusBadge status={a.status} />
            </div>
          )) : <div className="empty">No applications yet.</div>}
        </div>
      </div>
      <div className="card">
        <SectionHeader icon="🤖" title="Agent Status" />
        <div className="agent-row">
          <div className={`agent-dot ${stats.agent?.is_running?"running":""}`} />
          <span>{stats.agent?.is_running ? "Running — "+stats.agent.current_task : "Idle"}</span>
          <span className="agent-meta">{stats.agent?.tasks_succeeded} succeeded · {stats.agent?.tasks_failed} failed today</span>
        </div>
      </div>
    </div>
  );
}

// ── JOBS ──────────────────────────────────────────────────────────────────────
function JobsPage() {
  const [jobs,setJobs]=useState(null);
  const [filter,setFilter]=useState({keyword:"",work_mode:"",sort_by:"match_score"});
  const [page,setPage]=useState(1);
  const [total,setTotal]=useState(0);
  const [loading,setLoading]=useState(false);
  const [showAdd,setShowAdd]=useState(false);
  const [newJob,setNewJob]=useState({title:"",company_name:"",source_url:"",description_raw:"",location:""});
  const [adding,setAdding]=useState(false);
  const [msg,setMsg]=useState("");

  const load=async()=>{
    setLoading(true);
    try {
      const p=new URLSearchParams({page,page_size:15,sort_by:filter.sort_by});
      if(filter.keyword) p.set("keyword",filter.keyword);
      if(filter.work_mode) p.set("work_mode",filter.work_mode);
      const data=await apiFetch(`/api/jobs?${p}`);
      setJobs(data.items); setTotal(data.total);
    } catch(e){setMsg(e.message);}
    finally{setLoading(false);}
  };

  useEffect(()=>{load();},[page,filter.work_mode,filter.sort_by]);

  const addJob=async()=>{
    setAdding(true);
    try {
      await apiFetch("/api/jobs",{method:"POST",body:JSON.stringify(newJob)});
      setShowAdd(false);
      setNewJob({title:"",company_name:"",source_url:"",description_raw:"",location:""});
      setMsg("Job added & analysis queued!"); setTimeout(()=>setMsg(""),3000);
      load();
    } catch(e){setMsg(e.message);}
    finally{setAdding(false);}
  };

  const triggerAnalysis=async(id)=>{
    try { await apiFetch(`/api/jobs/${id}/analyze`,{method:"POST"}); setMsg("Analysis queued!"); setTimeout(()=>setMsg(""),2000); }
    catch(e){setMsg(e.message);}
  };

  const skipJob=async(id)=>{
    try { await apiFetch(`/api/jobs/${id}/skip`,{method:"POST"}); load(); }
    catch(e){setMsg(e.message);}
  };

  return (
    <div className="page">
      <div className="page-header">
        <div><h1 className="page-title">Job Feed</h1><p className="page-sub">{total} jobs discovered</p></div>
        <button className="btn-primary" onClick={()=>setShowAdd(true)}>+ Add Job</button>
      </div>
      <div className="filter-row">
        <input className="input small" placeholder="Search jobs, companies…" value={filter.keyword}
          onChange={e=>setFilter({...filter,keyword:e.target.value})}
          onKeyDown={e=>e.key==="Enter"&&load()} />
        <select className="select" value={filter.work_mode} onChange={e=>setFilter({...filter,work_mode:e.target.value})}>
          <option value="">All Modes</option>
          <option value="remote">Remote</option>
          <option value="hybrid">Hybrid</option>
          <option value="onsite">Onsite</option>
        </select>
        <select className="select" value={filter.sort_by} onChange={e=>setFilter({...filter,sort_by:e.target.value})}>
          <option value="match_score">Sort: Match Score</option>
          <option value="priority_score">Sort: Priority</option>
          <option value="posted_at">Sort: Date</option>
        </select>
        <button className="btn-ghost" onClick={load}>Search</button>
      </div>
      {msg && <div className="toast">{msg}</div>}
      {showAdd && (
        <div className="modal-overlay" onClick={()=>setShowAdd(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h3 className="modal-title">Add Job Manually</h3>
            {["title","company_name","source_url","location"].map(f=>(
              <input key={f} className="input" placeholder={f.replace(/_/g," ")} value={newJob[f]}
                onChange={e=>setNewJob({...newJob,[f]:e.target.value})} />
            ))}
            <textarea className="input" placeholder="Paste the job description here…" rows={5}
              value={newJob.description_raw}
              onChange={e=>setNewJob({...newJob,description_raw:e.target.value})}
              style={{resize:"vertical"}} />
            <div style={{display:"flex",gap:"8px"}}>
              <button className="btn-primary" onClick={addJob} disabled={adding}>{adding?"Adding…":"Add & Analyze"}</button>
              <button className="btn-ghost" onClick={()=>setShowAdd(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
      {loading ? <Spinner /> : (
        <div className="card">
          <table className="table">
            <thead><tr><th>Role</th><th>Company</th><th>Mode</th><th>Match</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
              {jobs?.map(j=>(
                <tr key={j.id} className="table-row">
                  <td>
                    <div className="row-title">{j.title}</div>
                    {j.analysis?.ai_summary && <div className="row-sub" style={{maxWidth:280}}>{j.analysis.ai_summary.slice(0,80)}…</div>}
                  </td>
                  <td>{j.company_name}</td>
                  <td><Badge color="#636e72">{j.work_mode}</Badge></td>
                  <td>
                    {j.analysis?.match_score!=null ? (
                      <div className="match-bar-wrap">
                        <div className="match-bar" style={{width:`${j.analysis.match_score}%`}} />
                        <span className="match-val">{j.analysis.match_score.toFixed(0)}%</span>
                      </div>
                    ) : <span style={{color:"#636e72",fontSize:"12px"}}>Pending</span>}
                  </td>
                  <td><StatusBadge status={j.status} /></td>
                  <td>
                    <div style={{display:"flex",gap:"6px"}}>
                      <button className="btn-xs" onClick={()=>triggerAnalysis(j.id)}>Analyze</button>
                      <button className="btn-xs danger" onClick={()=>skipJob(j.id)}>Skip</button>
                    </div>
                  </td>
                </tr>
              ))}
              {!jobs?.length && <tr><td colSpan={6} style={{textAlign:"center",padding:"40px",color:"#636e72"}}>No jobs yet. Run the agent or add manually.</td></tr>}
            </tbody>
          </table>
          <div className="pagination">
            <button className="btn-ghost small" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1}>← Prev</button>
            <span style={{color:"#636e72",fontSize:"13px"}}>Page {page} of {Math.ceil(total/15)||1}</span>
            <button className="btn-ghost small" onClick={()=>setPage(p=>p+1)} disabled={page>=Math.ceil(total/15)}>Next →</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── APPLICATIONS ──────────────────────────────────────────────────────────────
function ApplicationsPage() {
  const [apps,setApps]=useState(null);
  const [stats,setStats]=useState(null);
  const [filter,setFilter]=useState("");
  const [page,setPage]=useState(1);
  const [total,setTotal]=useState(0);
  const [msg,setMsg]=useState("");

  const load=async()=>{
    try {
      const p=new URLSearchParams({page,page_size:15});
      if(filter) p.set("status",filter);
      const [data,s]=await Promise.all([apiFetch(`/api/applications?${p}`),apiFetch("/api/applications/stats")]);
      setApps(data.items); setTotal(data.total); setStats(s);
    } catch(e){setMsg(e.message);}
  };

  useEffect(()=>{load();},[page,filter]);

  const updateStatus=async(id,status)=>{
    try { await apiFetch(`/api/applications/${id}/status`,{method:"PATCH",body:JSON.stringify({status})}); load(); }
    catch(e){setMsg(e.message);}
  };

  const toggleStar=async(id)=>{
    try { await apiFetch(`/api/applications/${id}/star`,{method:"PATCH"}); load(); } catch(e){}
  };

  const approve=async(id)=>{
    try {
      await apiFetch(`/api/applications/${id}/approve`,{method:"POST"});
      setMsg("✓ Approved & queued!"); setTimeout(()=>setMsg(""),2000); load();
    } catch(e){setMsg(e.message);}
  };

  return (
    <div className="page">
      <div className="page-header">
        <div><h1 className="page-title">Applications</h1><p className="page-sub">{total} total tracked</p></div>
      </div>
      {stats && (
        <div className="stats-grid">
          {[["Sent",stats.applied,"#00ff9d"],["Viewed",stats.viewed,"#a29bfe"],["Shortlisted",stats.shortlisted,"#fd79a8"],
            ["Interviews",stats.interviews,"#00d4ff"],["Offers",stats.offers,"#ffd700"],["Response %",`${stats.response_rate}%`,"#00ff9d"]
          ].map(([l,v,c])=><StatCard key={l} label={l} value={v} accent={c} />)}
        </div>
      )}
      {msg && <div className="toast">{msg}</div>}
      <div className="filter-row">
        {["","applied","interview_scheduled","offer_received","rejected","pending_approval"].map(s=>(
          <button key={s} className={`chip ${filter===s?"active":""}`} onClick={()=>setFilter(s)}>
            {s||"All"}
          </button>
        ))}
      </div>
      {!apps ? <Spinner /> : (
        <div className="card">
          <table className="table">
            <thead><tr><th></th><th>Role</th><th>Company</th><th>Applied</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
              {apps.map(a=>(
                <tr key={a.id} className="table-row">
                  <td><button className="star-btn" onClick={()=>toggleStar(a.id)}>{a.is_starred?"⭐":"☆"}</button></td>
                  <td><div className="row-title">{a.job_title_snapshot}</div></td>
                  <td>{a.company_snapshot}</td>
                  <td style={{fontSize:"12px",color:"#636e72"}}>{a.applied_at?new Date(a.applied_at).toLocaleDateString():"—"}</td>
                  <td><StatusBadge status={a.status} /></td>
                  <td>
                    <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                      {a.status==="pending_approval"&&<button className="btn-xs" style={{color:"#00ff9d",borderColor:"#00ff9d44"}} onClick={()=>approve(a.id)}>Approve</button>}
                      {a.status==="applied"&&<button className="btn-xs" onClick={()=>updateStatus(a.id,"interview_scheduled")}>→ Interview</button>}
                      {a.status==="interview_scheduled"&&<button className="btn-xs" onClick={()=>updateStatus(a.id,"offer_received")}>→ Offer</button>}
                      <button className="btn-xs danger" onClick={()=>updateStatus(a.id,"rejected")}>Reject</button>
                    </div>
                  </td>
                </tr>
              ))}
              {!apps.length && <tr><td colSpan={6} style={{textAlign:"center",padding:"40px",color:"#636e72"}}>No applications yet.</td></tr>}
            </tbody>
          </table>
          <div className="pagination">
            <button className="btn-ghost small" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1}>← Prev</button>
            <span style={{color:"#636e72",fontSize:"13px"}}>Page {page}</span>
            <button className="btn-ghost small" onClick={()=>setPage(p=>p+1)} disabled={apps.length<15}>Next →</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── RESUMES ───────────────────────────────────────────────────────────────────
function ResumesPage() {
  const [resumes,setResumes]=useState(null);
  const [perf,setPerf]=useState([]);
  const [msg,setMsg]=useState("");
  const fileRef=useRef();

  const load=async()=>{
    try {
      const [r,p]=await Promise.all([apiFetch("/api/resumes"),apiFetch("/api/analytics/resume-performance")]);
      setResumes(r); setPerf(p||[]);
    } catch(e){setMsg(e.message);}
  };

  useEffect(()=>{load();},[]);

  const setDefault=async(id)=>{
    try { await apiFetch(`/api/resumes/${id}/set-default`,{method:"PATCH"}); load(); }
    catch(e){setMsg(e.message);}
  };

  const upload=async(e)=>{
    const file=e.target.files[0]; if(!file) return;
    const name=prompt("Resume name?",file.name.replace(".pdf",""));
    if(!name) return;
    const fd=new FormData(); fd.append("file",file);
    try {
      const res=await fetch(`${API}/api/resumes/upload?name=${encodeURIComponent(name)}&resume_type=base`,{
        method:"POST", headers:{Authorization:`Bearer ${getToken()}`}, body:fd,
      });
      if(!res.ok) throw new Error("Upload failed");
      load(); setMsg("✓ Resume uploaded!"); setTimeout(()=>setMsg(""),2000);
    } catch(e){setMsg(e.message);}
    e.target.value="";
  };

  return (
    <div className="page">
      <div className="page-header">
        <div><h1 className="page-title">Resumes</h1><p className="page-sub">Version control & performance analytics</p></div>
        <button className="btn-primary" onClick={()=>fileRef.current.click()}>↑ Upload PDF</button>
        <input ref={fileRef} type="file" accept=".pdf" style={{display:"none"}} onChange={upload} />
      </div>
      {msg && <div className="toast">{msg}</div>}
      {!resumes ? <Spinner /> : (
        <div className="two-col">
          <div className="card">
            <SectionHeader icon="📄" title="Resume Versions" />
            {resumes.map(r=>(
              <div key={r.id} className="list-row">
                <div>
                  <div className="row-title" style={{display:"flex",alignItems:"center",gap:"8px"}}>
                    {r.name} {r.is_default&&<Badge color="#ffd700">DEFAULT</Badge>}
                  </div>
                  <div className="row-sub">v{r.version} · {r.resume_type} · ATS: {r.ats_score?.toFixed(0)??"—"}%</div>
                </div>
                {!r.is_default&&<button className="btn-xs" onClick={()=>setDefault(r.id)}>Set Default</button>}
              </div>
            ))}
            {!resumes.length&&<div className="empty">No resumes yet. Upload a PDF to get started.</div>}
          </div>
          <div className="card">
            <SectionHeader icon="📊" title="Performance Analytics" />
            {perf.map(r=>(
              <div key={r.id} className="list-row">
                <div>
                  <div className="row-title">{r.name}</div>
                  <div className="row-sub">Used {r.times_used}× · {r.response_count} responses</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{color:"#00ff9d",fontWeight:700}}>{r.response_rate?.toFixed(1)??0}%</div>
                  <div className="row-sub">response rate</div>
                </div>
              </div>
            ))}
            {!perf.length&&<div className="empty">No performance data yet.</div>}
          </div>

  useEffect(()=>{ load(); const id=setInterval(load,5000); return()=>clearInterval(id); },[]);

// ── CHAT ──────────────────────────────────────────────────────────────────────
function ChatPage() {
  const [messages,setMessages]=useState([
    {role:"assistant",content:"Hi! I'm your AI Career Assistant. Ask me to find jobs, apply, check stats, or get career advice."}
  ]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef();

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[messages]);

  const send=async()=>{
    if(!input.trim()||loading) return;
    const msg=input.trim(); setInput("");
    const newMsgs=[...messages,{role:"user",content:msg}];
    setMessages(newMsgs); setLoading(true);
    try {
      const history=newMsgs.slice(-10).slice(0,-1).map(m=>({role:m.role,content:m.content}));
      const res=await apiFetch("/api/chat",{method:"POST",body:JSON.stringify({message:msg,conversation_history:history})});
      const reply={role:"assistant",content:res.response,actions:res.actions_taken};
      setMessages([...newMsgs,reply]);
    } catch(e){
      setMessages([...newMsgs,{role:"assistant",content:`Error: ${e.message}`}]);
    } finally{setLoading(false);}
  };

  const SUGGESTIONS=[
    "Hey, how are you?",
    "What can you help me with?",
    "Find AI internships in Europe",
    "What's my application response rate?",
    "Tell me a joke",
    "Apply to top 3 matching jobs"
  ];

  return (
    <div className="page" style={{height:"calc(100vh - 20px)",display:"flex",flexDirection:"column"}}>
      <div className="page-header">
        <div><h1 className="page-title">AI Assistant</h1><p className="page-sub">Your personal career copilot</p></div>
      </div>
      <div className="chat-container" style={{flex:1}}>
        <div className="chat-messages">
          {!loading && messages.length === 0 && (
            <div style={{textAlign:'center',padding:'40px 20px',color:'var(--muted)'}}>
              <div style={{fontSize:'48px',marginBottom:'16px'}}>👋</div>
              <div style={{fontSize:'18px',color:'var(--text)',marginBottom:'8px'}}>Hey! I'm your AI Career Assistant</div>
              <div style={{fontSize:'13px'}}>Ask me anything - your jobs, applications, career advice, or just chat!</div>
            </div>
          )}
          {messages.map((m,i)=>(
            <div key={i} className={`chat-msg ${m.role}`}>
              <div className="chat-bubble">
                {m.content}
                {m.actions?.length>0&&(
                  <div className="chat-actions">
                    {m.actions.map((a,j)=><Badge key={j} color="#00d4ff">⚡ {a}</Badge>)}
                  </div>
                )}
              </div>
            </div>
          ))}
          {loading&&(
            <div className="chat-msg assistant">
              <div className="chat-bubble typing"><span/><span/><span/></div>
            </div>
          )}
          <div ref={bottomRef} />
        </div>
        <div className="chat-input-row">
          <input className="input" placeholder="Ask me anything… (career, jobs, or just chat)" value={input}
            onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} />
          <button className="btn-primary" onClick={send} disabled={loading||!input.trim()}>Send</button>
        </div>
      </div>
    </div>
  );
}

// ── PROFILE ───────────────────────────────────────────────────────────────────
function ProfilePage() {
  const [profile,setProfile]=useState(null);
  const [skills,setSkills]=useState([]);
  const [loading,setLoading]=useState(true);
  const [msg,setMsg]=useState("");
  const [activeSection,setActiveSection]=useState("personal");

  // Form states
  const [personal,setPersonal]=useState({
    phone:"", location:"", linkedin_url:"", github_url:"", portfolio_url:"", professional_summary:""
  });
  const [newSkill,setNewSkill]=useState({name:"", category:"", proficiency:"intermediate", years_experience:null, is_primary:false});
  const [showSkillForm,setShowSkillForm]=useState(false);

  // Experience states
  const [experiences,setExperiences]=useState([]);
  const [showExpForm,setShowExpForm]=useState(false);
  const [editingExp,setEditingExp]=useState(null);
  const [expForm,setExpForm]=useState({title:"", company:"", start_date:"", end_date:"", description:"", current:false});

  // Projects states
  const [projects,setProjects]=useState([]);
  const [showProjForm,setShowProjForm]=useState(false);
  const [editingProj,setEditingProj]=useState(null);
  const [projForm,setProjForm]=useState({name:"", description:"", tech_stack:"", github_url:"", demo_url:""});

  // Education states
  const [education,setEducation]=useState([]);
  const [showEduForm,setShowEduForm]=useState(false);
  const [editingEdu,setEditingEdu]=useState(null);
  const [eduForm,setEduForm]=useState({degree:"", field:"", institution:"", year:"", gpa:""});

  const loadProfile=async()=>{
    setLoading(true);
    try {
      const [p,s]=await Promise.all([apiFetch("/api/profile"),apiFetch("/api/profile/skills")]);
      setProfile(p);
      setSkills(s||[]);
      setPersonal({
        phone:p.phone||"",
        location:p.location||"",
        linkedin_url:p.linkedin_url||"",
        github_url:p.github_url||"",
        portfolio_url:p.portfolio_url||"",
        professional_summary:p.professional_summary||""
      });
      setExperiences(p.work_experience||[]);
      setProjects(p.projects||[]);
      setEducation(p.education||[]);
    } catch(e){
      setMsg(e.message);
    } finally{
      setLoading(false);
    }
  };

  useEffect(()=>{loadProfile();},[]);

  const savePersonal=async()=>{
    try {
      await apiFetch("/api/profile",{method:"PATCH",body:JSON.stringify(personal)});
      setMsg("✓ Profile saved!"); setTimeout(()=>setMsg(""),2000);
    } catch(e){setMsg(e.message);}
  };

  const addSkill=async()=>{
    if(!newSkill.name.trim()) return;
    try {
      const skill=await apiFetch("/api/profile/skills",{method:"POST",body:JSON.stringify({
        name:newSkill.name,
        category:newSkill.category||null,
        proficiency:newSkill.proficiency,
        years_experience:newSkill.years_experience?parseFloat(newSkill.years_experience):null,
        is_primary:newSkill.is_primary
      })});
      setSkills([...skills,skill]);
      setNewSkill({name:"", category:"", proficiency:"intermediate", years_experience:null, is_primary:false});
      setShowSkillForm(false);
      setMsg("✓ Skill added!"); setTimeout(()=>setMsg(""),2000);
    } catch(e){setMsg(e.message);}
  };

  const removeSkill=async(id)=>{
    try {
      await apiFetch(`/api/profile/skills/${id}`,{method:"DELETE"});
      setSkills(skills.filter(s=>s.id!==id));
      setMsg("✓ Skill removed"); setTimeout(()=>setMsg(""),2000);
    } catch(e){setMsg(e.message);}
  };

  const saveExperiences=async()=>{
    try {
      await apiFetch("/api/profile",{method:"PATCH",body:JSON.stringify({work_experience:experiences})});
      setMsg("✓ Experience saved!"); setTimeout(()=>setMsg(""),2000);
    } catch(e){setMsg(e.message);}
  };

  const addExperience=()=>{
    const exp={...expForm,start_date:expForm.start_date,end_date:expForm.current?null:expForm.end_date};
    if(editingExp!==null){
      const updated=[...experiences];
      updated[editingExp]=exp;
      setExperiences(updated);
      setEditingExp(null);
    }else{
      setExperiences([...experiences,exp]);
    }
    setExpForm({title:"", company:"", start_date:"", end_date:"", description:"", current:false});
    setShowExpForm(false);
  };

  const editExperience=(idx)=>{
    const e=experiences[idx];
    setExpForm({title:e.title||"", company:e.company||"", start_date:e.start_date||"", end_date:e.end_date||"", description:e.description||"", current:!e.end_date});
    setEditingExp(idx);
    setShowExpForm(true);
  };

  const deleteExperience=(idx)=>{
    setExperiences(experiences.filter((_,i)=>i!==idx));
  };

  const saveProjects=async()=>{
    try {
      await apiFetch("/api/profile",{method:"PATCH",body:JSON.stringify({projects:projects})});
      setMsg("✓ Projects saved!"); setTimeout(()=>setMsg(""),2000);
    } catch(e){setMsg(e.message);}
  };

  const addProject=()=>{
    const proj={...projForm,tech_stack:projForm.tech_stack.split(",").map(t=>t.trim()).filter(t=>t)};
    if(editingProj!==null){
      const updated=[...projects];
      updated[editingProj]=proj;
      setProjects(updated);
      setEditingProj(null);
    }else{
      setProjects([...projects,proj]);
    }
    setProjForm({name:"", description:"", tech_stack:"", github_url:"", demo_url:""});
    setShowProjForm(false);
  };

  const editProject=(idx)=>{
    const p=projects[idx];
    setProjForm({name:p.name||"", description:p.description||"", tech_stack:p.tech_stack?p.tech_stack.join(", "):"", github_url:p.github_url||"", demo_url:p.demo_url||""});
    setEditingProj(idx);
    setShowProjForm(true);
  };

  const deleteProject=(idx)=>{
    setProjects(projects.filter((_,i)=>i!==idx));
  };

  const saveEducation=async()=>{
    try {
      await apiFetch("/api/profile",{method:"PATCH",body:JSON.stringify({education:education})});
      setMsg("✓ Education saved!"); setTimeout(()=>setMsg(""),2000);
    } catch(e){setMsg(e.message);}
  };

  const addEducation=()=>{
    const edu={degree:eduForm.degree, field:eduForm.field, institution:eduForm.institution, year:eduForm.year?parseInt(eduForm.year):null, gpa:eduForm.gpa?parseFloat(eduForm.gpa):null};
    if(editingEdu!==null){
      const updated=[...education];
      updated[editingEdu]=edu;
      setEducation(updated);
      setEditingEdu(null);
    }else{
      setEducation([...education,edu]);
    }
    setEduForm({degree:"", field:"", institution:"", year:"", gpa:""});
    setShowEduForm(false);
  };

  const editEducation=(idx)=>{
    const e=education[idx];
    setEduForm({degree:e.degree||"", field:e.field||"", institution:e.institution||"", year:e.year?String(e.year):"", gpa:e.gpa?String(e.gpa):""});
    setEditingEdu(idx);
    setShowEduForm(true);
  };

  const deleteEducation=(idx)=>{
    setEducation(education.filter((_,i)=>i!==idx));
  };

  const SECTIONS=[
    {key:"personal",icon:"👤",label:"Personal Details"},
    {key:"skills",icon:"⚡",label:"Skills"},
    {key:"experience",icon:"💼",label:"Experience"},
    {key:"projects",icon:"🚀",label:"Projects"},
    {key:"education",icon:"🎓",label:"Education"}
  ];

  const SKILL_CATEGORIES=["programming","frameworks","tools","cloud","databases","soft_skills","other"];
  const PROFICIENCY_LEVELS=["beginner","intermediate","advanced","expert"];

  if(loading) return <Spinner />;

  return (
    <div className="page">
      <div className="page-header">
        <div><h1 className="page-title">Profile</h1><p className="page-sub">Manage your career information</p></div>
      </div>
      {msg&&<div className="toast">{msg}</div>}
      <div className="profile-layout">
        <div className="profile-nav">
          {SECTIONS.map(s=>(
            <button key={s.key} className={`profile-nav-item ${activeSection===s.key?"active":""}`} onClick={()=>setActiveSection(s.key)}>
              <span>{s.icon}</span> <span>{s.label}</span>
            </button>
          ))}
        </div>
        <div className="profile-content">
          {/* Personal Details */}
          {activeSection==="personal"&&(
            <div className="card">
              <SectionHeader icon="👤" title="Personal Details" action={<button className="btn-primary" onClick={savePersonal}>Save Changes</button>} />
              <div className="form-grid">
                <div className="form-group">
                  <label className="form-label">Phone</label>
                  <input className="input" placeholder="+1 234 567 8900" value={personal.phone} onChange={e=>setPersonal({...personal,phone:e.target.value})} />
                </div>
                <div className="form-group">
                  <label className="form-label">Location</label>
                  <input className="input" placeholder="San Francisco, CA" value={personal.location} onChange={e=>setPersonal({...personal,location:e.target.value})} />
                </div>

                  <input className="input" placeholder="https://linkedin.com/in/yourprofile" value={personal.linkedin_url} onChange={e=>setPersonal({...personal,linkedin_url:e.target.value})} />

                  <textarea className="input" rows={2} placeholder="Description" value={projForm.description} onChange={e=>setProjForm({...projForm,description:e.target.value})} />
                  <input className="input" placeholder="Tech Stack (comma separated)" value={projForm.tech_stack} onChange={e=>setProjForm({...projForm,tech_stack:e.target.value})} />
                  <input className="input" placeholder="GitHub URL" value={projForm.github_url} onChange={e=>setProjForm({...projForm,github_url:e.target.value})} />
                  <input className="input" placeholder="Demo URL" value={projForm.demo_url} onChange={e=>setProjForm({...projForm,demo_url:e.target.value})} />
                  <div className="form-actions">
                    <button className="btn-primary" onClick={addProject}>{editingProj!==null?"Update":"Add"}</button>
                    <button className="btn-ghost" onClick={()=>{setShowProjForm(false);setEditingProj(null);setProjForm({name:"", description:"", tech_stack:"", github_url:"", demo_url:""})}}>Cancel</button>

              )}
              <div className="entries-list">
                {projects.length===0&&<div className="empty">No projects added yet.</div>}
                {projects.map((proj,i)=>(
                  <div key={i} className="entry-card">
                    <div className="entry-header">
                      <div className="entry-title">{proj.name}</div>
                      <div className="entry-actions">
                        <button className="btn-xs" onClick={()=>editProject(i)}>Edit</button>
                        <button className="btn-xs danger" onClick={()=>deleteProject(i)}>Delete</button>
                      </div>
                    </div>
                    {proj.description&&<div className="entry-desc">{proj.description}</div>}
                    {proj.tech_stack?.length>0&&<div className="entry-tags">{proj.tech_stack.map(t=><Badge key={t} color="#00d4ff">{t}</Badge>)}</div>}
                    <div className="entry-links">
                      {proj.github_url&&<a href={proj.github_url} target="_blank" rel="noopener">GitHub</a>}
                      {proj.demo_url&&<a href={proj.demo_url} target="_blank" rel="noopener">Demo</a>}

          {/* Education */}
          {activeSection==="education"&&(
            <div className="card">
              <SectionHeader icon="🎓" title="Education" action={<><button className="btn-primary" onClick={()=>setShowEduForm(true)}>+ Add Education</button><button className="btn-ghost" onClick={saveEducation} style={{marginLeft:8}}>Save</button></>} />
              {showEduForm&&(
                <div className="modal-form">
                  <input className="input" placeholder="Degree (e.g., B.Tech, M.S.)" value={eduForm.degree} onChange={e=>setEduForm({...eduForm,degree:e.target.value})} />
                  <input className="input" placeholder="Field of Study (e.g., Computer Science)" value={eduForm.field} onChange={e=>setEduForm({...eduForm,field:e.target.value})} />
                  <input className="input" placeholder="Institution" value={eduForm.institution} onChange={e=>setEduForm({...eduForm,institution:e.target.value})} />
                  <div className="form-row">
                    <input className="input" type="number" placeholder="Year" value={eduForm.year} onChange={e=>setEduForm({...eduForm,year:e.target.value})} />
                    <input className="input" type="number" step="0.1" placeholder="GPA" value={eduForm.gpa} onChange={e=>setEduForm({...eduForm,gpa:e.target.value})} />
                  </div>
                  <div className="form-actions">
                    <button className="btn-primary" onClick={addEducation}>{editingEdu!==null?"Update":"Add"}</button>
                    <button className="btn-ghost" onClick={()=>{setShowEduForm(false);setEditingEdu(null);setEduForm({degree:"", field:"", institution:"", year:"", gpa:""})}}>Cancel</button>

              )}
              <div className="entries-list">
                {education.length===0&&<div className="empty">No education added yet.</div>}
                {education.map((edu,i)=>(
                  <div key={i} className="entry-card">
                    <div className="entry-header">
                      <div className="entry-title">{edu.degree} in {edu.field}</div>
                      <div className="entry-actions">

            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── SECURITY: CREDENTIALS & CONSENTS ───────────────────────────────────────
function SecurityPage() {
  const [creds, setCreds] = useState([]);
  const [consents, setConsents] = useState([]);
  const [defaults, setDefaults] = useState(null);
  const [loading, setLoading] = useState(true);
  const [msg, setMsg] = useState("");
  const [activeTab, setActiveTab] = useState("credentials");
  
  // Credential form
  const [showCredForm, setShowCredForm] = useState(false);
  const [credForm, setCredForm] = useState({
    credential_type: "linkedin", display_name: "", email: "", password: ""
  });
  
  const loadData = async () => {
    setLoading(true);
    try {
      const [c, cd, defs] = await Promise.all([
        apiFetch("/api/security/credentials"),
        apiFetch("/api/security/consents"),
        apiFetch("/api/security/consents/defaults")
      ]);
      setCreds(c);
      setConsents(cd);
      setDefaults(defs);
    } catch(e) { setMsg(e.message); }
    finally { setLoading(false); }
  };
  
  useEffect(() => { loadData(); }, []);
  
  const addCredential = async () => {
    if (!credForm.email || !credForm.password) {
      setMsg("Email and password required"); return;
    }
    try {
      await apiFetch("/api/security/credentials", {
        method: "POST",
        body: JSON.stringify({
          credential_type: credForm.credential_type,
          display_name: credForm.display_name || credForm.credential_type,
          credentials: { email: credForm.email, password: credForm.password },
          consent: true
        })
      });
      setMsg("✓ Credential stored securely!");
      setShowCredForm(false);
      setCredForm({ credential_type: "linkedin", display_name: "", email: "", password: "" });
      loadData();
    } catch(e) { setMsg(e.message); }
  };
  
  const deleteCredential = async (id) => {
    if (!confirm("Delete this credential?")) return;
    try {
      await apiFetch(`/api/security/credentials/${id}`, { method: "DELETE" });
      setMsg("✓ Credential deleted");
      loadData();
    } catch(e) { setMsg(e.message); }
  };
  
  const updateConsent = async (type, scope, granted, purpose) => {
    try {
      await apiFetch("/api/security/consents", {
        method: "POST",
        body: JSON.stringify({
          consent_type: type, scope, granted, purpose,
          data_categories: []
        })
      });
      setMsg(granted ? "✓ Consent granted" : "✓ Consent revoked");
      loadData();
    } catch(e) { setMsg(e.message); }
  };
  
  const requestDataExport = async () => {
    try {
      await apiFetch("/api/security/data/export", { method: "POST" });
      setMsg("✓ Export requested - you'll receive an email when ready");
    } catch(e) { setMsg(e.message); }
  };
  
  const requestDataDelete = async () => {
    if (!confirm("This will delete all your data. Are you sure?")) return;
    if (!confirm("This action cannot be undone. Continue?")) return;
    try {
      await apiFetch("/api/security/data/delete", { method: "POST" });
      setMsg("✓ Deletion requested");
    } catch(e) { setMsg(e.message); }
  };
  
  if (loading) return <Spinner />;
  
  return (
    <div className="page">
      <div className="page-header">
        <div>
          <h1 className="page-title">🔐 Security & Privacy</h1>
          <p className="page-sub">Manage your credentials, consents, and data rights</p>
        </div>
      </div>
      
      {msg && <div className="card" style={{background:"#00ff9d11",borderColor:"#00ff9d44",marginBottom:20}}>{msg}</div>}
      
      <div className="tab-row" style={{marginBottom:20}}>
        <button className={`tab-btn ${activeTab==="credentials"?"active":""}`} onClick={()=>setActiveTab("credentials")}>Platform Credentials</button>
        <button className={`tab-btn ${activeTab==="consents"?"active":""}`} onClick={()=>setActiveTab("consents")}>Consents</button>
        <button className={`tab-btn ${activeTab==="data"?"active":""}`} onClick={()=>setActiveTab("data")}>Your Data</button>
      </div>
      
      {activeTab === "credentials" && (
        <div className="card">
          <div className="section-header">
            <h2 className="section-title">Stored Credentials</h2>
            <button className="btn-primary" onClick={()=>setShowCredForm(true)}>+ Add Credential</button>
          </div>
          
          {showCredForm && (
            <div className="card" style={{background:"#1a1a24",marginBottom:20}}>
              <h3 style={{marginBottom:16}}>Add Platform Credential</h3>
              <div className="two-col">
                <div>
                  <label className="field-label">Platform</label>
                  <select className="field-input" value={credForm.credential_type} onChange={e=>setCredForm({...credForm, credential_type:e.target.value})}>
                    <option value="linkedin">LinkedIn</option>
                    <option value="indeed">Indeed</option>
                    <option value="internshala">Internshala</option>
                    <option value="wellfound">Wellfound</option>
                  </select>
                </div>
                <div>
                  <label className="field-label">Display Name</label>
                  <input className="field-input" placeholder="My LinkedIn" value={credForm.display_name} onChange={e=>setCredForm({...credForm, display_name:e.target.value})} />
                </div>
              </div>
              <div className="two-col" style={{marginTop:12}}>
                <div>
                  <label className="field-label">Email / Username</label>
                  <input className="field-input" type="text" value={credForm.email} onChange={e=>setCredForm({...credForm, email:e.target.value})} />
                </div>
                <div>
                  <label className="field-label">Password</label>
                  <input className="field-input" type="password" value={credForm.password} onChange={e=>setCredForm({...credForm, password:e.target.value})} />
                </div>
              </div>
              <p style={{fontSize:11,color:"#636e72",marginTop:12}}>🔒 Credentials are encrypted with AES-256-GCM before storage</p>
              <div className="form-actions" style={{marginTop:16}}>
                <button className="btn-primary" onClick={addCredential}>Store Credential</button>
                <button className="btn-ghost" onClick={()=>setShowCredForm(false)}>Cancel</button>
              </div>
            </div>
          )}
          
          {creds.length === 0 && <div className="empty">No credentials stored. Add a platform to enable auto-apply.</div>}
          
          {creds.map(c => (
            <div key={c.id} className="entry-card">
              <div className="entry-header">
                <div className="entry-title">{c.display_name} <Badge color="#00d4ff">{c.credential_type}</Badge></div>
                <div className="entry-actions">
                  <button className="btn-xs danger" onClick={()=>deleteCredential(c.id)}>Delete</button>
                </div>
              </div>
              <div className="entry-company">Used {c.use_count} times • {c.consent_given ? "✓ Consent given" : "No consent"}</div>
            </div>
          ))}
        </div>
      )}
      
      {activeTab === "consents" && defaults && (
        <div className="card">
          <div className="section-header">
            <h2 className="section-title">Privacy Consents</h2>
          </div>
          
          <p style={{color:"#636e72",marginBottom:20}}>Manage how we use your data. Essential consents are required for the service to work.</p>
          
          {defaults.essentials?.map(c => {
            const current = consents.find(x => x.consent_type === c.type);
            return (
              <div key={c.type} className="entry-card" style={{opacity:current?.granted===false?0.5:1}}>
                <div className="entry-header">
                  <div className="entry-title">{c.type.replace(/_/g," ")} <Badge color="#ffd700">Required</Badge></div>
                </div>
                <div className="entry-company">{c.purpose}</div>
              </div>
            );
          })}
          
          {defaults.optional?.map(c => {
            const current = consents.find(x => x.consent_type === c.type);
            const granted = current?.granted ?? false;
            return (
              <div key={c.type} className="entry-card">
                <div className="entry-header">
                  <div className="entry-title">{c.type.replace(/_/g," ")}</div>
                  <label style={{display:"flex",alignItems:"center",gap:8}}>
                    <input type="checkbox" checked={granted} onChange={e => updateConsent(c.type, c.scope, e.target.checked, c.purpose)} />
                    <span>{granted ? "Enabled" : "Disabled"}</span>
                  </label>
                </div>
                <div className="entry-company">{c.purpose}</div>
              </div>
            );
          })}
        </div>
      )}
      
      {activeTab === "data" && (
        <div className="card">
          <div className="section-header">
            <h2 className="section-title">Your Data Rights (GDPR)</h2>
          </div>
          
          <p style={{color:"#636e72",marginBottom:20}}>You have the right to access, export, and delete your personal data.</p>
          
          <div className="task-grid" style={{gridTemplateColumns:"1fr 1fr"}}>
            <div className="task-card" onClick={requestDataExport}>
              <div className="task-label">📥 Export My Data</div>
              <div style={{fontSize:11,color:"#636e72",marginTop:8}}>Download all your data in JSON format</div>
            </div>
            <div className="task-card" onClick={requestDataDelete} style={{borderColor:"#ff4757"}}>
              <div className="task-label" style={{color:"#ff4757"}}>🗑️ Delete My Data</div>
              <div style={{fontSize:11,color:"#636e72",marginTop:8}}>Permanently delete your account and data</div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [authed,setAuthed]=useState(!!getToken());
  const [nav,setNav]=useState("dashboard");
  const [dashData,setDashData]=useState(null);
  const [user,setUser]=useState(null);

  const loadDash=async()=>{
    try {
      const [d,u]=await Promise.all([apiFetch("/api/analytics/dashboard"),apiFetch("/api/auth/me")]);
      setDashData(d); setUser(u);
    } catch(e){
      if(e.message.includes("401")||e.message.includes("credentials")||e.message.includes("422")){
        clearToken(); setAuthed(false);
      }
    }
  };

  useEffect(()=>{ if(authed) loadDash(); },[authed]);

  const logout=()=>{ clearToken(); setAuthed(false); setDashData(null); setUser(null); };

  const NAV=[
    {key:"dashboard",icon:"◈",label:"Dashboard"},
    {key:"profile",icon:"👤",label:"Profile"},
    {key:"jobs",icon:"⬡",label:"Jobs"},
    {key:"applications",icon:"◇",label:"Applications"},
    {key:"resumes",icon:"▣",label:"Resumes"},
    {key:"analytics",icon:"◎",label:"Intelligence"},
    {key:"agent",icon:"⬢",label:"Agent"},
    {key:"chat",icon:"◉",label:"AI Chat"},
    {key:"security",icon:"🔐",label:"Security"},
  ];

  if(!authed) return <LoginScreen onLogin={()=>setAuthed(true)} />;

  return (
    <div className="app">
      <nav className="sidebar">
        <div className="sidebar-logo">
          <span className="logo-icon">⬡</span>
          <span className="logo-text">CAREER<span style={{color:"#00ff9d"}}>OS</span></span>
        </div>
        <div className="nav-links">
          {NAV.map(({key,icon,label})=>(
            <button key={key} className={`nav-item ${nav===key?"active":""}`} onClick={()=>setNav(key)}>
              <span className="nav-icon">{icon}</span><span>{label}</span>
            </button>
          ))}
        </div>
        <div className="sidebar-footer">
          {user&&<div className="user-info"><div className="user-name">{user.full_name}</div><div className="user-email">{user.email}</div></div>}
          <button className="btn-ghost small" onClick={logout}>Sign Out</button>
        </div>
      </nav>
      <main className="main-content">
        {nav==="dashboard"&&<Dashboard stats={dashData} />}
        {nav==="profile"&&<ProfilePage />}
        {nav==="jobs"&&<JobsPage />}
        {nav==="applications"&&<ApplicationsPage />}
        {nav==="resumes"&&<ResumesPage />}
        {nav==="analytics"&&<AnalyticsPage />}
        {nav==="agent"&&<AgentPage />}
        {nav==="chat"&&<ChatPage />}
        {nav==="security"&&<SecurityPage />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
