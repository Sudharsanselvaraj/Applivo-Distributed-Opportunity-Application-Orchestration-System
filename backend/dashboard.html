<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CareerOS — AI Career Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; }
body { background: #0a0a0f; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const API = "http://127.0.0.1:8000";

const getToken = () => localStorage.getItem("careeros_token");
const setToken = (t) => localStorage.setItem("careeros_token", t);
const clearToken = () => localStorage.removeItem("careeros_token");

async function apiFetch(path, opts = {}) {
  const token = getToken();
  const res = await fetch(`${API}${path}`, {
    ...opts,
    headers: {
      "Content-Type": "application/json",
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
      ...(opts.headers || {}),
    },
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || `HTTP ${res.status}`);
  }
  return res.json();
}

const Spinner = () => (
  <div style={{ display:"flex", justifyContent:"center", padding:"40px" }}>
    <div className="spinner" />
  </div>
);

const Badge = ({ children, color = "#00ff9d" }) => (
  <span style={{
    background: color + "22", color, border: `1px solid ${color}44`,
    borderRadius:"4px", padding:"2px 8px", fontSize:"11px", fontWeight:700,
    letterSpacing:"0.05em", textTransform:"uppercase", fontFamily:"var(--font-mono)",
  }}>{children}</span>
);

const StatusBadge = ({ status }) => {
  const map = {
    applied:"#00ff9d", interview_scheduled:"#00d4ff", offer_received:"#ffd700",
    offer_accepted:"#ffd700", rejected:"#ff4757", viewed:"#a29bfe",
    shortlisted:"#fd79a8", pending_approval:"#fdcb6e", queued:"#74b9ff",
    failed:"#ff4757", new:"#636e72", analyzed:"#00ff9d", success:"#00ff9d",
    running:"#00d4ff", pending:"#fdcb6e",
  };
  return <Badge color={map[status] || "#636e72"}>{status?.replace(/_/g," ")}</Badge>;
};

const StatCard = ({ label, value, sub, accent="#00ff9d" }) => (
  <div className="stat-card">
    <div className="stat-value" style={{ color:accent }}>{value ?? "—"}</div>
    <div className="stat-label">{label}</div>
    {sub && <div className="stat-sub">{sub}</div>}
  </div>
);

const SectionHeader = ({ icon, title, action }) => (
  <div className="section-header">
    <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
      <span style={{ fontSize:"18px" }}>{icon}</span>
      <h2 className="section-title">{title}</h2>
    </div>
    {action}
  </div>
);

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [mode, setMode] = useState("login");
  const [form, setForm] = useState({ email:"", password:"", full_name:"" });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");

  const submit = async () => {
    setLoading(true); setError("");
    try {
      if (mode === "register") {
        await apiFetch("/api/auth/register", { method:"POST", body:JSON.stringify(form) });
        setMode("login");
        setError("Registered! Please sign in.");
        return;
      }
      const data = await apiFetch("/api/auth/login", {
        method:"POST", body:JSON.stringify({ email:form.email, password:form.password }),
      });
      setToken(data.access_token);
      onLogin();
    } catch(e) { setError(e.message); }
    finally { setLoading(false); }
  };

  return (
    <div className="login-bg">
      <div className="login-grid" />
      <div className="login-card">
        <div className="login-logo">
          <span className="logo-icon">⬡</span>
          <span className="logo-text">CAREER<span style={{color:"#00ff9d"}}>OS</span></span>
        </div>
        <p className="login-sub">Personal AI Career Automation Platform</p>
        <div className="tab-row">
          <button className={`tab-btn ${mode==="login"?"active":""}`} onClick={()=>setMode("login")}>Sign In</button>
          <button className={`tab-btn ${mode==="register"?"active":""}`} onClick={()=>setMode("register")}>Register</button>
        </div>
        {mode==="register" && (
          <input className="input" placeholder="Full Name" value={form.full_name}
            onChange={e=>setForm({...form,full_name:e.target.value})} />
        )}
        <input className="input" placeholder="Email" type="email" value={form.email}
          onChange={e=>setForm({...form,email:e.target.value})} />
        <input className="input" placeholder="Password" type="password" value={form.password}
          onChange={e=>setForm({...form,password:e.target.value})}
          onKeyDown={e=>e.key==="Enter"&&submit()} />
        {error && (
          <div style={{color:error.includes("Registered")?"#00ff9d":"#ff4757",fontSize:"13px",marginTop:"4px"}}>
            {error}
          </div>
        )}
        <button className="btn-primary" onClick={submit} disabled={loading}>
          {loading ? "Loading..." : mode==="login" ? "Launch Platform →" : "Create Account →"}
        </button>
      </div>
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function Dashboard({ stats }) {
  if (!stats) return <Spinner />;
  const a = stats.applications;
  return (
    <div className="page">
      <div className="page-header">
        <div>
          <h1 className="page-title">Mission Control</h1>
          <p className="page-sub">Your career automation at a glance</p>
        </div>
      </div>
      <div className="stats-grid">
        <StatCard label="Applications Sent" value={a.total_sent} accent="#00ff9d" />
        <StatCard label="Interviews" value={a.interviews} accent="#00d4ff" />
        <StatCard label="Offers" value={a.offers} accent="#ffd700" />
        <StatCard label="Response Rate" value={`${a.response_rate}%`} accent="#a29bfe" />
        <StatCard label="Interview Rate" value={`${a.interview_rate}%`} accent="#fd79a8" />
        <StatCard label="Jobs in DB" value={stats.total_jobs_in_db} sub={`+${stats.new_jobs_today} today`} accent="#00ff9d" />
      </div>
      <div className="funnel-row">
        {[
          {label:"Pending",val:a.pending_approval,c:"#fdcb6e"},
          {label:"Applied",val:a.applied,c:"#00ff9d"},
          {label:"Viewed",val:a.viewed,c:"#a29bfe"},
          {label:"Shortlisted",val:a.shortlisted,c:"#fd79a8"},
          {label:"Interviews",val:a.interviews,c:"#00d4ff"},
          {label:"Offers",val:a.offers,c:"#ffd700"},
          {label:"Rejected",val:a.rejected,c:"#ff4757"},
        ].map(({label,val,c})=>(
          <div key={label} className="funnel-item">
            <div className="funnel-bar-wrap">
              <div className="funnel-bar" style={{height:`${Math.min(100,(val/Math.max(a.total_sent,1))*100)}%`,background:c}} />
            </div>
            <div className="funnel-val" style={{color:c}}>{val}</div>
            <div className="funnel-label">{label}</div>
          </div>
        ))}
      </div>
      <div className="two-col">
        <div className="card">
          <SectionHeader icon="🏆" title="Top Matching Jobs" />
          {stats.top_jobs?.length ? stats.top_jobs.map(j=>(
            <div key={j.id} className="list-row">
              <div>
                <div className="row-title">{j.title}</div>
                <div className="row-sub">{j.company_name} · {j.work_mode}</div>
              </div>
              <Badge color="#00ff9d">{j.analysis?.match_score?.toFixed(0)??"?"}%</Badge>
            </div>
          )) : <div className="empty">No jobs yet. Run the agent to discover jobs.</div>}
        </div>
        <div className="card">
          <SectionHeader icon="📋" title="Recent Applications" />
          {stats.recent_applications?.length ? stats.recent_applications.map(a=>(
            <div key={a.id} className="list-row">
              <div>
                <div className="row-title">{a.job_title_snapshot}</div>
                <div className="row-sub">{a.company_snapshot}</div>
              </div>
              <StatusBadge status={a.status} />
            </div>
          )) : <div className="empty">No applications yet.</div>}
        </div>
      </div>
      <div className="card">
        <SectionHeader icon="🤖" title="Agent Status" />
        <div className="agent-row">
          <div className={`agent-dot ${stats.agent?.is_running?"running":""}`} />
          <span>{stats.agent?.is_running ? "Running — "+stats.agent.current_task : "Idle"}</span>
          <span className="agent-meta">{stats.agent?.tasks_succeeded} succeeded · {stats.agent?.tasks_failed} failed today</span>
        </div>
      </div>
    </div>
  );
}

// ── JOBS ──────────────────────────────────────────────────────────────────────
function JobsPage() {
  const [jobs,setJobs]=useState(null);
  const [filter,setFilter]=useState({keyword:"",work_mode:"",sort_by:"match_score"});
  const [page,setPage]=useState(1);
  const [total,setTotal]=useState(0);
  const [loading,setLoading]=useState(false);
  const [showAdd,setShowAdd]=useState(false);
  const [newJob,setNewJob]=useState({title:"",company_name:"",source_url:"",description_raw:"",location:""});
  const [adding,setAdding]=useState(false);
  const [msg,setMsg]=useState("");

  const load=async()=>{
    setLoading(true);
    try {
      const p=new URLSearchParams({page,page_size:15,sort_by:filter.sort_by});
      if(filter.keyword) p.set("keyword",filter.keyword);
      if(filter.work_mode) p.set("work_mode",filter.work_mode);
      const data=await apiFetch(`/api/jobs?${p}`);
      setJobs(data.items); setTotal(data.total);
    } catch(e){setMsg(e.message);}
    finally{setLoading(false);}
  };

  useEffect(()=>{load();},[page,filter.work_mode,filter.sort_by]);

  const addJob=async()=>{
    setAdding(true);
    try {
      await apiFetch("/api/jobs",{method:"POST",body:JSON.stringify(newJob)});
      setShowAdd(false);
      setNewJob({title:"",company_name:"",source_url:"",description_raw:"",location:""});
      setMsg("Job added & analysis queued!"); setTimeout(()=>setMsg(""),3000);
      load();
    } catch(e){setMsg(e.message);}
    finally{setAdding(false);}
  };

  const triggerAnalysis=async(id)=>{
    try { await apiFetch(`/api/jobs/${id}/analyze`,{method:"POST"}); setMsg("Analysis queued!"); setTimeout(()=>setMsg(""),2000); }
    catch(e){setMsg(e.message);}
  };

  const skipJob=async(id)=>{
    try { await apiFetch(`/api/jobs/${id}/skip`,{method:"POST"}); load(); }
    catch(e){setMsg(e.message);}
  };

  return (
    <div className="page">
      <div className="page-header">
        <div><h1 className="page-title">Job Feed</h1><p className="page-sub">{total} jobs discovered</p></div>
        <button className="btn-primary" onClick={()=>setShowAdd(true)}>+ Add Job</button>
      </div>
      <div className="filter-row">
        <input className="input small" placeholder="Search jobs, companies…" value={filter.keyword}
          onChange={e=>setFilter({...filter,keyword:e.target.value})}
          onKeyDown={e=>e.key==="Enter"&&load()} />
        <select className="select" value={filter.work_mode} onChange={e=>setFilter({...filter,work_mode:e.target.value})}>
          <option value="">All Modes</option>
          <option value="remote">Remote</option>
          <option value="hybrid">Hybrid</option>
          <option value="onsite">Onsite</option>
        </select>
        <select className="select" value={filter.sort_by} onChange={e=>setFilter({...filter,sort_by:e.target.value})}>
          <option value="match_score">Sort: Match Score</option>
          <option value="priority_score">Sort: Priority</option>
          <option value="posted_at">Sort: Date</option>
        </select>
        <button className="btn-ghost" onClick={load}>Search</button>
      </div>
      {msg && <div className="toast">{msg}</div>}
      {showAdd && (
        <div className="modal-overlay" onClick={()=>setShowAdd(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h3 className="modal-title">Add Job Manually</h3>
            {["title","company_name","source_url","location"].map(f=>(
              <input key={f} className="input" placeholder={f.replace(/_/g," ")} value={newJob[f]}
                onChange={e=>setNewJob({...newJob,[f]:e.target.value})} />
            ))}
            <textarea className="input" placeholder="Paste the job description here…" rows={5}
              value={newJob.description_raw}
              onChange={e=>setNewJob({...newJob,description_raw:e.target.value})}
              style={{resize:"vertical"}} />
            <div style={{display:"flex",gap:"8px"}}>
              <button className="btn-primary" onClick={addJob} disabled={adding}>{adding?"Adding…":"Add & Analyze"}</button>
              <button className="btn-ghost" onClick={()=>setShowAdd(false)}>Cancel</button>
            </div>
          </div>
        </div>
      )}
      {loading ? <Spinner /> : (
        <div className="card">
          <table className="table">
            <thead><tr><th>Role</th><th>Company</th><th>Mode</th><th>Match</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
              {jobs?.map(j=>(
                <tr key={j.id} className="table-row">
                  <td>
                    <div className="row-title">{j.title}</div>
                    {j.analysis?.ai_summary && <div className="row-sub" style={{maxWidth:280}}>{j.analysis.ai_summary.slice(0,80)}…</div>}
                  </td>
                  <td>{j.company_name}</td>
                  <td><Badge color="#636e72">{j.work_mode}</Badge></td>
                  <td>
                    {j.analysis?.match_score!=null ? (
                      <div className="match-bar-wrap">
                        <div className="match-bar" style={{width:`${j.analysis.match_score}%`}} />
                        <span className="match-val">{j.analysis.match_score.toFixed(0)}%</span>
                      </div>
                    ) : <span style={{color:"#636e72",fontSize:"12px"}}>Pending</span>}
                  </td>
                  <td><StatusBadge status={j.status} /></td>
                  <td>
                    <div style={{display:"flex",gap:"6px"}}>
                      <button className="btn-xs" onClick={()=>triggerAnalysis(j.id)}>Analyze</button>
                      <button className="btn-xs danger" onClick={()=>skipJob(j.id)}>Skip</button>
                    </div>
                  </td>
                </tr>
              ))}
              {!jobs?.length && <tr><td colSpan={6} style={{textAlign:"center",padding:"40px",color:"#636e72"}}>No jobs yet. Run the agent or add manually.</td></tr>}
            </tbody>
          </table>
          <div className="pagination">
            <button className="btn-ghost small" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1}>← Prev</button>
            <span style={{color:"#636e72",fontSize:"13px"}}>Page {page} of {Math.ceil(total/15)||1}</span>
            <button className="btn-ghost small" onClick={()=>setPage(p=>p+1)} disabled={page>=Math.ceil(total/15)}>Next →</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── APPLICATIONS ──────────────────────────────────────────────────────────────
function ApplicationsPage() {
  const [apps,setApps]=useState(null);
  const [stats,setStats]=useState(null);
  const [filter,setFilter]=useState("");
  const [page,setPage]=useState(1);
  const [total,setTotal]=useState(0);
  const [msg,setMsg]=useState("");

  const load=async()=>{
    try {
      const p=new URLSearchParams({page,page_size:15});
      if(filter) p.set("status",filter);
      const [data,s]=await Promise.all([apiFetch(`/api/applications?${p}`),apiFetch("/api/applications/stats")]);
      setApps(data.items); setTotal(data.total); setStats(s);
    } catch(e){setMsg(e.message);}
  };

  useEffect(()=>{load();},[page,filter]);

  const updateStatus=async(id,status)=>{
    try { await apiFetch(`/api/applications/${id}/status`,{method:"PATCH",body:JSON.stringify({status})}); load(); }
    catch(e){setMsg(e.message);}
  };

  const toggleStar=async(id)=>{
    try { await apiFetch(`/api/applications/${id}/star`,{method:"PATCH"}); load(); } catch(e){}
  };

  const approve=async(id)=>{
    try {
      await apiFetch(`/api/applications/${id}/approve`,{method:"POST"});
      setMsg("✓ Approved & queued!"); setTimeout(()=>setMsg(""),2000); load();
    } catch(e){setMsg(e.message);}
  };

  return (
    <div className="page">
      <div className="page-header">
        <div><h1 className="page-title">Applications</h1><p className="page-sub">{total} total tracked</p></div>
      </div>
      {stats && (
        <div className="stats-grid">
          {[["Sent",stats.applied,"#00ff9d"],["Viewed",stats.viewed,"#a29bfe"],["Shortlisted",stats.shortlisted,"#fd79a8"],
            ["Interviews",stats.interviews,"#00d4ff"],["Offers",stats.offers,"#ffd700"],["Response %",`${stats.response_rate}%`,"#00ff9d"]
          ].map(([l,v,c])=><StatCard key={l} label={l} value={v} accent={c} />)}
        </div>
      )}
      {msg && <div className="toast">{msg}</div>}
      <div className="filter-row">
        {["","applied","interview_scheduled","offer_received","rejected","pending_approval"].map(s=>(
          <button key={s} className={`chip ${filter===s?"active":""}`} onClick={()=>setFilter(s)}>
            {s||"All"}
          </button>
        ))}
      </div>
      {!apps ? <Spinner /> : (
        <div className="card">
          <table className="table">
            <thead><tr><th></th><th>Role</th><th>Company</th><th>Applied</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
              {apps.map(a=>(
                <tr key={a.id} className="table-row">
                  <td><button className="star-btn" onClick={()=>toggleStar(a.id)}>{a.is_starred?"⭐":"☆"}</button></td>
                  <td><div className="row-title">{a.job_title_snapshot}</div></td>
                  <td>{a.company_snapshot}</td>
                  <td style={{fontSize:"12px",color:"#636e72"}}>{a.applied_at?new Date(a.applied_at).toLocaleDateString():"—"}</td>
                  <td><StatusBadge status={a.status} /></td>
                  <td>
                    <div style={{display:"flex",gap:"6px",flexWrap:"wrap"}}>
                      {a.status==="pending_approval"&&<button className="btn-xs" style={{color:"#00ff9d",borderColor:"#00ff9d44"}} onClick={()=>approve(a.id)}>Approve</button>}
                      {a.status==="applied"&&<button className="btn-xs" onClick={()=>updateStatus(a.id,"interview_scheduled")}>→ Interview</button>}
                      {a.status==="interview_scheduled"&&<button className="btn-xs" onClick={()=>updateStatus(a.id,"offer_received")}>→ Offer</button>}
                      <button className="btn-xs danger" onClick={()=>updateStatus(a.id,"rejected")}>Reject</button>
                    </div>
                  </td>
                </tr>
              ))}
              {!apps.length && <tr><td colSpan={6} style={{textAlign:"center",padding:"40px",color:"#636e72"}}>No applications yet.</td></tr>}
            </tbody>
          </table>
          <div className="pagination">
            <button className="btn-ghost small" onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1}>← Prev</button>
            <span style={{color:"#636e72",fontSize:"13px"}}>Page {page}</span>
            <button className="btn-ghost small" onClick={()=>setPage(p=>p+1)} disabled={apps.length<15}>Next →</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── RESUMES ───────────────────────────────────────────────────────────────────
function ResumesPage() {
  const [resumes,setResumes]=useState(null);
  const [perf,setPerf]=useState([]);
  const [msg,setMsg]=useState("");
  const fileRef=useRef();

  const load=async()=>{
    try {
      const [r,p]=await Promise.all([apiFetch("/api/resumes"),apiFetch("/api/analytics/resume-performance")]);
      setResumes(r); setPerf(p||[]);
    } catch(e){setMsg(e.message);}
  };

  useEffect(()=>{load();},[]);

  const setDefault=async(id)=>{
    try { await apiFetch(`/api/resumes/${id}/set-default`,{method:"PATCH"}); load(); }
    catch(e){setMsg(e.message);}
  };

  const upload=async(e)=>{
    const file=e.target.files[0]; if(!file) return;
    const name=prompt("Resume name?",file.name.replace(".pdf",""));
    if(!name) return;
    const fd=new FormData(); fd.append("file",file);
    try {
      const res=await fetch(`${API}/api/resumes/upload?name=${encodeURIComponent(name)}&resume_type=base`,{
        method:"POST", headers:{Authorization:`Bearer ${getToken()}`}, body:fd,
      });
      if(!res.ok) throw new Error("Upload failed");
      load(); setMsg("✓ Resume uploaded!"); setTimeout(()=>setMsg(""),2000);
    } catch(e){setMsg(e.message);}
    e.target.value="";
  };

  return (
    <div className="page">
      <div className="page-header">
        <div><h1 className="page-title">Resumes</h1><p className="page-sub">Version control & performance analytics</p></div>
        <button className="btn-primary" onClick={()=>fileRef.current.click()}>↑ Upload PDF</button>
        <input ref={fileRef} type="file" accept=".pdf" style={{display:"none"}} onChange={upload} />
      </div>
      {msg && <div className="toast">{msg}</div>}
      {!resumes ? <Spinner /> : (
        <div className="two-col">
          <div className="card">
            <SectionHeader icon="📄" title="Resume Versions" />
            {resumes.map(r=>(
              <div key={r.id} className="list-row">
                <div>
                  <div className="row-title" style={{display:"flex",alignItems:"center",gap:"8px"}}>
                    {r.name} {r.is_default&&<Badge color="#ffd700">DEFAULT</Badge>}
                  </div>
                  <div className="row-sub">v{r.version} · {r.resume_type} · ATS: {r.ats_score?.toFixed(0)??"—"}%</div>
                </div>
                {!r.is_default&&<button className="btn-xs" onClick={()=>setDefault(r.id)}>Set Default</button>}
              </div>
            ))}
            {!resumes.length&&<div className="empty">No resumes yet. Upload a PDF to get started.</div>}
          </div>
          <div className="card">
            <SectionHeader icon="📊" title="Performance Analytics" />
            {perf.map(r=>(
              <div key={r.id} className="list-row">
                <div>
                  <div className="row-title">{r.name}</div>
                  <div className="row-sub">Used {r.times_used}× · {r.response_count} responses</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{color:"#00ff9d",fontWeight:700}}>{r.response_rate?.toFixed(1)??0}%</div>
                  <div className="row-sub">response rate</div>
                </div>
              </div>
            ))}
            {!perf.length&&<div className="empty">No performance data yet.</div>}
          </div>
        </div>
      )}
    </div>
  );
}

// ── ANALYTICS ─────────────────────────────────────────────────────────────────
function AnalyticsPage() {
  const [gaps,setGaps]=useState(null);
  const [market,setMarket]=useState(null);

  useEffect(()=>{
    apiFetch("/api/analytics/skill-gaps").then(setGaps).catch(()=>setGaps([]));
    apiFetch("/api/analytics/market").then(setMarket).catch(()=>setMarket(null));
  },[]);

  return (
    <div className="page">
      <div className="page-header">
        <div><h1 className="page-title">Intelligence</h1><p className="page-sub">Skill gaps · Market trends · Career insights</p></div>
      </div>
      <div className="two-col">
        <div className="card">
          <SectionHeader icon="⚡" title="Skill Gaps" />
          {!gaps ? <Spinner /> : gaps.length ? gaps.map(g=>(
            <div key={g.id} className="list-row">
              <div>
                <div className="row-title">{g.skill_name}</div>
                <div className="row-sub">{g.demand_count} jobs need this · {g.demand_percentage?.toFixed(0)}% of market</div>
              </div>
              <Badge color={g.priority==="critical"?"#ff4757":g.priority==="high"?"#fdcb6e":"#636e72"}>{g.priority}</Badge>
            </div>
          )) : <div className="empty">No skill gaps yet. Run the agent to analyze the job market.</div>}
        </div>
        <div className="card">
          <SectionHeader icon="📈" title="Market Intelligence" />
          {!market ? (
            <div className="empty">No market snapshot yet. Run the agent to generate one.</div>
          ) : (
            <>
              <div className="row-sub" style={{marginBottom:"12px"}}>
                {market.total_jobs_analyzed} jobs analyzed · {new Date(market.snapshot_date).toLocaleDateString()}
              </div>
              <div style={{marginBottom:"16px"}}>
                <div className="row-title" style={{marginBottom:"8px"}}>Top In-Demand Skills</div>
                {market.top_skills?.slice(0,8).map(s=>(
                  <div key={s.skill} className="skill-bar-row">
                    <span className="skill-name">{s.skill}</span>
                    <div className="skill-bar-wrap"><div className="skill-bar" style={{width:`${s.percentage||0}%`}} /></div>
                    <span className="skill-pct">{s.count}</span>
                  </div>
                ))}
              </div>
              {market.emerging_roles?.length>0 && (
                <div>
                  <div className="row-title" style={{marginBottom:"8px"}}>Emerging Roles</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
                    {market.emerging_roles.map(r=><Badge key={r} color="#00d4ff">{r}</Badge>)}
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ── AGENT ─────────────────────────────────────────────────────────────────────
function AgentPage() {
  const [status,setStatus]=useState(null);
  const [tasks,setTasks]=useState([]);
  const [msg,setMsg]=useState("");

  const load=async()=>{
    try {
      const [s,t]=await Promise.all([apiFetch("/api/agent/status"),apiFetch("/api/agent/tasks?limit=20")]);
      setStatus(s); setTasks(t);
    } catch(e){setMsg(e.message);}
  };

  useEffect(()=>{ load(); const id=setInterval(load,5000); return()=>clearInterval(id); },[]);

  const run=async(task_type)=>{
    try {
      await apiFetch("/api/agent/run",{method:"POST",body:JSON.stringify({task_type})});
      setMsg(`✓ ${task_type} triggered`); setTimeout(()=>setMsg(""),3000); setTimeout(load,1000);
    } catch(e){setMsg(e.message);}
  };

  const TASKS=[
    {key:"scrape_jobs",label:"🔍 Scrape All Jobs",desc:"LinkedIn · Indeed · Internshala · Wellfound"},
    {key:"scrape_linkedin",label:"💼 LinkedIn",desc:"Scrape LinkedIn only"},
    {key:"scrape_indeed",label:"🏢 Indeed",desc:"Scrape Indeed only"},
    {key:"analyze_new_jobs",label:"🧠 Analyze Jobs",desc:"AI-analyze all new jobs"},
    {key:"market_snapshot",label:"📊 Market Snapshot",desc:"Update market intelligence"},
    {key:"daily_digest",label:"📨 Daily Digest",desc:"Send Telegram + Email summary"},
    {key:"check_follow_ups",label:"📬 Follow-ups",desc:"Send due follow-up emails"},
  ];

  return (
    <div className="page">
      <div className="page-header">
        <div><h1 className="page-title">Agent Control</h1><p className="page-sub">Background automation · Live status · Auto-refreshes every 5s</p></div>
      </div>
      {msg && <div className="toast">{msg}</div>}
      {status && (
        <div className="card" style={{marginBottom:"20px"}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:"12px"}}>
            <div className={`agent-dot-big ${status.is_running?"running":""}`} style={{marginTop:"4px"}} />
            <div>
              <div className="row-title" style={{fontSize:"15px"}}>{status.is_running?"Running: "+status.current_task:"Agent Idle"}</div>
              <div className="row-sub">Today: {status.tasks_succeeded} succeeded · {status.tasks_failed} failed · {status.jobs_found_today} jobs found · {status.applications_today} applied</div>
            </div>
          </div>
        </div>
      )}
      <div className="task-grid">
        {TASKS.map(({key,label,desc})=>(
          <div key={key} className="task-card" onClick={()=>run(key)}>
            <div className="task-label">{label}</div>
            <div className="task-desc">{desc}</div>
            <div className="task-run">Run Now →</div>
          </div>
        ))}
      </div>
      <div className="card">
        <SectionHeader icon="📋" title="Task History" />
        <table className="table">
          <thead><tr><th>Task</th><th>Status</th><th>Duration</th><th>Time</th></tr></thead>
          <tbody>
            {tasks.map(t=>(
              <tr key={t.id} className="table-row">
                <td style={{fontFamily:"var(--font-mono)",fontSize:"12px"}}>{t.task_type}</td>
                <td><StatusBadge status={t.status} /></td>
                <td style={{fontSize:"12px",color:"#636e72"}}>{t.duration_ms?`${t.duration_ms}ms`:"—"}</td>
                <td style={{fontSize:"12px",color:"#636e72"}}>{new Date(t.created_at).toLocaleTimeString()}</td>
              </tr>
            ))}
            {!tasks.length&&<tr><td colSpan={4} style={{textAlign:"center",padding:"30px",color:"#636e72"}}>No tasks yet.</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── CHAT ──────────────────────────────────────────────────────────────────────
function ChatPage() {
  const [messages,setMessages]=useState([
    {role:"assistant",content:"Hi! I'm your AI Career Assistant. Ask me to find jobs, apply, check stats, or get career advice."}
  ]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef();

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[messages]);

  const send=async()=>{
    if(!input.trim()||loading) return;
    const msg=input.trim(); setInput("");
    const newMsgs=[...messages,{role:"user",content:msg}];
    setMessages(newMsgs); setLoading(true);
    try {
      const history=newMsgs.slice(-10).slice(0,-1).map(m=>({role:m.role,content:m.content}));
      const res=await apiFetch("/api/chat",{method:"POST",body:JSON.stringify({message:msg,conversation_history:history})});
      const reply={role:"assistant",content:res.response,actions:res.actions_taken};
      setMessages([...newMsgs,reply]);
    } catch(e){
      setMessages([...newMsgs,{role:"assistant",content:`Error: ${e.message}`}]);
    } finally{setLoading(false);}
  };

  const SUGGESTIONS=["Find AI internships in Europe","What's my application response rate?","Which skills should I learn next?","Apply to top 3 matching jobs"];

  return (
    <div className="page" style={{height:"calc(100vh - 20px)",display:"flex",flexDirection:"column"}}>
      <div className="page-header">
        <div><h1 className="page-title">AI Assistant</h1><p className="page-sub">Your personal career copilot</p></div>
      </div>
      <div className="chat-container" style={{flex:1}}>
        <div className="chat-messages">
          {messages.map((m,i)=>(
            <div key={i} className={`chat-msg ${m.role}`}>
              <div className="chat-bubble">
                {m.content}
                {m.actions?.length>0&&(
                  <div className="chat-actions">
                    {m.actions.map((a,j)=><Badge key={j} color="#00d4ff">⚡ {a}</Badge>)}
                  </div>
                )}
              </div>
            </div>
          ))}
          {loading&&(
            <div className="chat-msg assistant">
              <div className="chat-bubble typing"><span/><span/><span/></div>
            </div>
          )}
          <div ref={bottomRef} />
        </div>
        {messages.length===1&&(
          <div className="suggestions">
            {SUGGESTIONS.map(s=>(
              <button key={s} className="suggestion-btn" onClick={()=>setInput(s)}>{s}</button>
            ))}
          </div>
        )}
        <div className="chat-input-row">
          <input className="input" placeholder="Ask anything about your career…" value={input}
            onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} />
          <button className="btn-primary" onClick={send} disabled={loading||!input.trim()}>Send</button>
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [authed,setAuthed]=useState(!!getToken());
  const [nav,setNav]=useState("dashboard");
  const [dashData,setDashData]=useState(null);
  const [user,setUser]=useState(null);

  const loadDash=async()=>{
    try {
      const [d,u]=await Promise.all([apiFetch("/api/analytics/dashboard"),apiFetch("/api/auth/me")]);
      setDashData(d); setUser(u);
    } catch(e){
      if(e.message.includes("401")||e.message.includes("credentials")||e.message.includes("422")){
        clearToken(); setAuthed(false);
      }
    }
  };

  useEffect(()=>{ if(authed) loadDash(); },[authed]);

  const logout=()=>{ clearToken(); setAuthed(false); setDashData(null); setUser(null); };

  const NAV=[
    {key:"dashboard",icon:"◈",label:"Dashboard"},
    {key:"jobs",icon:"⬡",label:"Jobs"},
    {key:"applications",icon:"◇",label:"Applications"},
    {key:"resumes",icon:"▣",label:"Resumes"},
    {key:"analytics",icon:"◎",label:"Intelligence"},
    {key:"agent",icon:"⬢",label:"Agent"},
    {key:"chat",icon:"◉",label:"AI Chat"},
  ];

  if(!authed) return <LoginScreen onLogin={()=>setAuthed(true)} />;

  return (
    <div className="app">
      <nav className="sidebar">
        <div className="sidebar-logo">
          <span className="logo-icon">⬡</span>
          <span className="logo-text">CAREER<span style={{color:"#00ff9d"}}>OS</span></span>
        </div>
        <div className="nav-links">
          {NAV.map(({key,icon,label})=>(
            <button key={key} className={`nav-item ${nav===key?"active":""}`} onClick={()=>setNav(key)}>
              <span className="nav-icon">{icon}</span><span>{label}</span>
            </button>
          ))}
        </div>
        <div className="sidebar-footer">
          {user&&<div className="user-info"><div className="user-name">{user.full_name}</div><div className="user-email">{user.email}</div></div>}
          <button className="btn-ghost small" onClick={logout}>Sign Out</button>
        </div>
      </nav>
      <main className="main-content">
        {nav==="dashboard"&&<Dashboard stats={dashData} />}
        {nav==="jobs"&&<JobsPage />}
        {nav==="applications"&&<ApplicationsPage />}
        {nav==="resumes"&&<ResumesPage />}
        {nav==="analytics"&&<AnalyticsPage />}
        {nav==="agent"&&<AgentPage />}
        {nav==="chat"&&<ChatPage />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

.btn-xs.danger:hover { color:var(--danger); border-color:var(--danger); }
.star-btn { background:none; border:none; cursor:pointer; font-size:14px; padding:2px 4px; }
.chip { padding:5px 12px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--muted); font-family:var(--font-mono); font-size:11px; cursor:pointer; transition:all 0.2s; }
.chip.active,.chip:hover { border-color:var(--accent); color:var(--accent); background:#00ff9d0a; }
.modal-overlay { position:fixed; inset:0; background:#0009; z-index:100; display:flex; align-items:center; justify-content:center; }
.modal { background:var(--surface); border:1px solid var(--border2); border-radius:14px; padding:28px; width:480px; display:flex; flex-direction:column; gap:12px; max-height:90vh; overflow-y:auto; }
.modal-title { font-family:var(--font-display); font-weight:800; font-size:18px; margin-bottom:4px; }
.toast { position:fixed; bottom:24px; right:24px; z-index:999; background:var(--surface); border:1px solid var(--accent); color:var(--accent); padding:12px 20px; border-radius:8px; font-size:12px; box-shadow:0 0 20px #00ff9d22; animation:slideUp 0.3s ease; }
@keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.spinner { width:24px; height:24px; border:2px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
@media(max-width:1100px) { .stats-grid{grid-template-columns:repeat(3,1fr)} .task-grid{grid-template-columns:repeat(2,1fr)} }
@media(max-width:800px) { .two-col{grid-template-columns:1fr} .sidebar{display:none} }
</style>
